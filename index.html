/* ================= Utilidades de vacaciones (LFT 2023) ================= */
function diasPorAntiguedad(years){
  if (years < 1) return 0;
  if (years <= 5) return 10 + 2*years; // 1:12 2:14 3:16 4:18 5:20
  const bloque = Math.ceil((years-5)/5);
  return 20 + 2*bloque; // 6-10:22 11-15:24 16-20:26 ...
}
function antiguedadAnios(fechaIngresoStr){
  const ing = new Date(fechaIngresoStr+"T00:00:00");
  const hoy = new Date();
  let years = hoy.getFullYear() - ing.getFullYear();
  const anniv = new Date(ing); anniv.setFullYear(ing.getFullYear()+years);
  if (anniv > hoy) years -= 1;
  return Math.max(0, years);
}
function pad2(n){ return String(n).padStart(2,"0"); }
function toISODate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function primerLunes(year, monthIndex){
  const d = new Date(year, monthIndex, 1);
  const offset = (8 - d.getDay()) % 7;
  d.setDate(1 + offset);
  return d;
}
function tercerLunes(year, monthIndex){
  const d = primerLunes(year, monthIndex);
  d.setDate(d.getDate() + 14);
  return d;
}
const FESTIVOS_CACHE = {};
function festivosOficiales(year){
  if(FESTIVOS_CACHE[year]) return FESTIVOS_CACHE[year];
  const lista = [
    {fecha:`${year}-01-01`, nombre:"Año Nuevo"},
    {fecha:toISODate(primerLunes(year,1)), nombre:"Día de la Constitución"},
    {fecha:toISODate(tercerLunes(year,2)), nombre:"Natalicio de Benito Juárez"},
    {fecha:`${year}-05-01`, nombre:"Día del Trabajo"},
    {fecha:`${year}-09-16`, nombre:"Día de la Independencia"},
    {fecha:toISODate(tercerLunes(year,10)), nombre:"Día de la Revolución Mexicana"},
    {fecha:`${year}-12-25`, nombre:"Navidad"},
  ];
  FESTIVOS_CACHE[year] = lista;
  return lista;
}
function nombreFestivoOficial(dateStr){
  const year = Number(dateStr.slice(0,4));
  const f = festivosOficiales(year).find(f=>f.fecha===dateStr);
  return f ? f.nombre : null;
}
function empleadosCumpleaniosEnDia(dateStr){
  const md = dateStr.slice(5,10);
  return state.employees.filter(e=>!e.isAdmin && e.fechaNacimiento && e.fechaNacimiento.slice(5,10)===md);
}
function esCumpleanos(dateStr, fechaNacimientoStr){
  if(!fechaNacimientoStr) return false;
  return dateStr.slice(5,10) === fechaNacimientoStr.slice(5,10);
}
function diasHabilesEntre(fi, ff, fechaNacimiento){
  const d1 = new Date(fi+"T00:00:00"), d2 = new Date(ff+"T00:00:00");
  if (d2 < d1) return 0;
  let count=0, cur=new Date(d1);
  while(cur<=d2){
    const day=cur.getDay();
    const dateStr = toISODate(cur);
    if(day!==0 && !nombreFestivoOficial(dateStr) && !esCumpleanos(dateStr, fechaNacimiento)) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}
function isoWeek(dateStr){
  const d = new Date(dateStr+"T00:00:00");
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - ((d.getDay()+6)%7));
  const week1 = new Date(d.getFullYear(),0,4);
  return 1 + Math.round(((d-week1)/86400000 - 3 + ((week1.getDay()+6)%7))/7);
}
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_SEMANA = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const ORDINALES = ["","primer","segundo","tercer","cuarto","quinto","sexto","séptimo","octavo","noveno","décimo"];
function ordinalTexto(n){
  return ORDINALES[n] || `${n}°`;
}
function todayStr(){
  const d = new Date(); d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}
function addDaysStr(dateStr, n){
  const d = new Date(dateStr+"T00:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
const DIAS_ANTICIPACION = 7;
const CATEGORIAS_DEFAULT = ["AG Almacén","AG Armado","OPM Almacén","OPM Armado","Chófer","OPM Inventarios","Limpieza","RH","SUP Almacén","SUP Armado"];
function categoriasDisponibles(){
  return (state.categorias && state.categorias.length>0) ? state.categorias : CATEGORIAS_DEFAULT;
}
const DEPARTAMENTOS_DEFAULT = ["DLSLP","Almacén DLSLP","Armado DLSP"];
function departamentosDisponibles(){
  return (state.departamentos && state.departamentos.length>0) ? state.departamentos : DEPARTAMENTOS_DEFAULT;
}
function departamentoDe(nomina){
  const emp = state.employees.find(e=>e.nomina===nomina);
  return emp && emp.departamento ? emp.departamento : "";
}
function fechaAniversario(fechaIngresoStr, n){
  const d = new Date(fechaIngresoStr+"T00:00:00");
  d.setFullYear(d.getFullYear()+n);
  return d.toISOString().slice(0,10);
}
function calcularPeriodoActual(fechaIngresoStr){
  const anios = antiguedadAnios(fechaIngresoStr);
  const inicio = fechaAniversario(fechaIngresoStr, anios);
  const inicioSiguiente = fechaAniversario(fechaIngresoStr, anios+1);
  const fin = addDaysStr(inicioSiguiente, -1);
  return {inicio, fin, anios};
}
const DIAS_MAX_ADELANTO = 3;
const MESES_ANTES_ADELANTO = 6;
function fechaMenosMeses(dateStr, meses){
  const d = new Date(dateStr+"T00:00:00");
  d.setMonth(d.getMonth()-meses);
  return toISODate(d);
}
// ¿Está el empleado dentro de la ventana de 6 meses antes de su próximo
// aniversario? De ser así puede adelantar hasta 3 días de su siguiente periodo.
function ventanaAdelanto(fechaIngresoStr){
  const periodo = calcularPeriodoActual(fechaIngresoStr);
  const proximoInicio = fechaAniversario(fechaIngresoStr, periodo.anios+1);
  const inicioVentana = fechaMenosMeses(proximoInicio, MESES_ANTES_ADELANTO);
  const hoy = todayStr();
  return { enVentana: hoy>=inicioVentana && hoy<proximoInicio, proximoInicio };
}
// Cuántos días de adelanto ya se tomaron (aprobados) para el siguiente periodo
function adelantoTomadoPara(nomina, proximoInicio){
  return state.requests
    .filter(r=>r.nomina===nomina && r.estado==="aprobado" && r.esAdelanto && r.adelantoParaPeriodoInicio===proximoInicio)
    .reduce((s,r)=>s+(r.diasAdelanto||0),0);
}
const PALETA_CATEGORIAS = ["#2F6F5E","#C9793A","#5B7FBD","#A2557B","#3D8B5F","#7A5C3E","#4E8FA6","#8C6E4E","#6E6E9E","#9C6644"];
function colorCategoria(cat){
  if(!cat) return "#A7B0AC";
  let hash=0;
  for(let i=0;i<cat.length;i++) hash = cat.charCodeAt(i) + ((hash<<5)-hash);
  return PALETA_CATEGORIAS[Math.abs(hash) % PALETA_CATEGORIAS.length];
}
function categoriaDe(nomina){
  const emp = state.employees.find(e=>e.nomina===nomina);
  return emp && emp.categoria ? emp.categoria.trim() : "";
}
function fechaNacimientoDe(nomina){

}

async function handleLogin(e){
  e.preventDefault();
  const nomina = document.getElementById("nomina").value.trim();
  const password = document.getElementById("password").value;
  state.loginError = ""; state.loading = true; render();
  try{
    const empRef = doc(db,"employees",nomina);
    const empSnap = await getDoc(empRef);
    if(!empSnap.exists()){
      state.loginError = "Ese número de nómina no está registrado. Contacta a RH.";
      state.loading=false; render(); return;
    }
    const email = nomina+"@vacaciones.local";
    try{
      await signInWithEmailAndPassword(auth, email, password);
    }catch(err){
      if(err.code === "auth/user-not-found" || err.code === "auth/invalid-credential"){
        // primer inicio de sesión: intentamos crear la cuenta con esa contraseña
        try{
          await createUserWithEmailAndPassword(auth, email, password);
        }catch(err2){
          if(err2.code === "auth/email-already-in-use"){
            state.loginError = "Contraseña incorrecta.";
          } else if(err2.code === "auth/weak-password"){
            state.loginError = "La contraseña debe tener al menos 6 caracteres.";
          } else {
            state.loginError = "No se pudo iniciar sesión: " + err2.message;
          }
          state.loading=false; render(); return;
        }
      } else if(err.code === "auth/wrong-password"){
        state.loginError = "Contraseña incorrecta.";
        state.loading=false; render(); return;
      } else {
        state.loginError = "No se pudo iniciar sesión: " + err.message;
        state.loading=false; render(); return;
      }
    }
    // onAuthStateChanged se encarga de cargar el perfil y renderizar
  }catch(err){
    state.loginError = "Ocurrió un error: " + err.message;
    state.loading=false; render();
  }
}

async function handleSetupAdmin(e){
  e.preventDefault();
  const nomina = document.getElementById("s_nomina").value.trim();
  const nombre = document.getElementById("s_nombre").value.trim();
  const fecha = document.getElementById("s_fecha").value;
  const password = document.getElementById("s_password").value;
  const errBox = document.getElementById("setupError");
  try{
    const empRef = doc(db,"employees",nomina);
    const snap = await getDoc(empRef);
    if(snap.exists()){
      errBox.innerHTML = `<div class="error-box">Ese número de nómina ya existe. Usa "Entrar" en la pantalla principal.</div>`;
      return;
    }
    const email = nomina+"@vacaciones.local";
    try{
      await createUserWithEmailAndPassword(auth, email, password);
    }catch(errAuth){
      if(errAuth.code === "auth/email-already-in-use"){
        // Quedó una cuenta de acceso de un intento anterior sin completar:
        // iniciamos sesión con ella en vez de crearla de nuevo.
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        throw errAuth;
      }
    }
    await setDoc(empRef, {
      nomina, nombre, fechaIngreso: fecha, fechaNacimiento:null, isAdmin:true, diasManual:null, activo:true
    });
    await setDoc(doc(db,"meta","setup"), {creado:true, nomina, fecha: new Date().toISOString()});
  }catch(err){
    errBox.innerHTML = `<div class="error-box">${err.message}</div>`;
  }
}

/* ================= Auth listener ================= */
function watchAuth(){
  onAuthStateChanged(auth, async (fbUser)=>{
    if(!fbUser){
      state.user=null;
      detachListeners();
      render();
      return;
    }
    const nomina = fbUser.email.split("@")[0];
    const snap = await getDoc(doc(db,"employees",nomina));
    if(!snap.exists()){
      await signOut(auth);
      return;
    }
    const data = snap.data();
    state.user = {nomina, nombre:data.nombre, isAdmin:!!data.isAdmin};
    state.loading = false;
    state.view = state.user.isAdmin ? "empleados" : "misvacaciones";
    attachListeners();
    render();
  });
}

function attachListeners(){
  detachListeners();
  state.unsubEmployees = onSnapshot(collection(db,"employees"), (snap)=>{
    state.employees = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  });
  // Un admin puede escuchar TODAS las solicitudes. Un empleado solo puede
  // escuchar las suyas: las reglas de seguridad exigen que la consulta
  // venga filtrada por su propia nómina, o Firestore la rechaza entera
  // (así estaba el bug: al empleado nunca le llegaba ni su propia solicitud).
  const requestsQuery = state.user.isAdmin
    ? collection(db,"requests")
    : query(collection(db,"requests"), where("nomina","==",state.user.nomina));
  state.unsubRequests = onSnapshot(requestsQuery, (snap)=>{
    state.requests = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  });
  state.unsubCategorias = onSnapshot(doc(db,"meta","categorias"), (snap)=>{
    state.categorias = snap.exists() ? (snap.data().lista||[]) : null;
    render();
  });
  state.unsubDepartamentos = onSnapshot(doc(db,"meta","departamentos"), (snap)=>{
    state.departamentos = snap.exists() ? (snap.data().lista||[]) : null;
    render();
  });
}
function detachListeners(){
  if(state.unsubEmployees) state.unsubEmployees();
  if(state.unsubRequests) state.unsubRequests();
  if(state.unsubCategorias) state.unsubCategorias();
  if(state.unsubDepartamentos) state.unsubDepartamentos();
  state.unsubEmployees=null; state.unsubRequests=null; state.unsubCategorias=null; state.unsubDepartamentos=null;
}

/* ================= Cálculo de balance de un empleado ================= */
function balanceDe(nomina){
  const emp = state.employees.find(e=>e.nomina===nomina);
  if(!emp) return {antig:0, totales:0, tomados:0, restantes:0, esAdmin:false, ajustado:false};
  if(emp.isAdmin) return {antig:null, totales:null, tomados:null, restantes:null, esAdmin:true, ajustado:false};

  const periodo = calcularPeriodoActual(emp.fechaIngreso);
  const totalesCalculados = (emp.diasManual!==null && emp.diasManual!==undefined) ? emp.diasManual : diasPorAntiguedad(periodo.anios);

  // Los días de un periodo que ya terminó NO se suman al siguiente: solo
  // contamos aprobaciones cuya fecha de inicio cae dentro del periodo vigente.
  const tomadosPeriodo = state.requests
    .filter(r=>r.nomina===nomina && r.estado==="aprobado" && r.fechaInicio>=periodo.inicio && r.fechaInicio<=periodo.fin)
    .reduce((sum,r)=>sum+(r.diasHabiles||0),0);

  // Ajuste manual de "días restantes": solo aplica si fue registrado para
  // ESTE MISMO periodo vigente. En cuanto el periodo cambie (nuevo aniversario),
  // deja de aplicar automáticamente y todo vuelve al cálculo normal.
  const tieneAjuste = (emp.diasRestantesIniciales!==null && emp.diasRestantesIniciales!==undefined)
    && emp.diasRestantesInicialesPeriodoInicio === periodo.inicio;

  // Adelanto tomado en la ventana de 6 meses previa a este periodo (préstamo
  // de hasta 3 días contra el periodo que apenas comenzó).
  const adelantoPrevio = adelantoTomadoPara(nomina, periodo.inicio);

  // "totales" SIEMPRE es el número real del periodo (por antigüedad o manual).
  // "restantes" depende de si hay ajuste o no, y siempre resta el adelanto ya
  // tomado. "tomados" se deriva de los otros dos (totales - restantes) para
  // que los tres números siempre cuadren entre sí.
  const restantes = tieneAjuste
    ? Math.max(0, emp.diasRestantesIniciales - tomadosPeriodo - adelantoPrevio)
    : Math.max(0, totalesCalculados - tomadosPeriodo - adelantoPrevio);
  const tomados = Math.max(0, totalesCalculados - restantes);

  return {antig:periodo.anios, totales:totalesCalculados, tomados, restantes, esAdmin:false, ajustado:tieneAjuste};
}

// Busca si el empleado ya tiene una solicitud (no rechazada) marcada con
// prima vacacional dentro de su periodo vigente. Devuelve esa solicitud
// o null si todavía no la ha pedido este periodo.
function primaYaSolicitadaEstePeriodo(nomina){
  const emp = state.employees.find(e=>e.nomina===nomina);
  if(!emp) return null;
  const periodo = calcularPeriodoActual(emp.fechaIngreso);

  // Marcado manual por RH (ej. se le pagó antes de usar el sistema, o fuera
  // de una solicitud). Solo aplica al periodo vigente; en el siguiente
  // periodo se libera solo, sin que RH tenga que hacer nada.
  if(emp.primaPagadaManual && emp.primaPagadaManualPeriodoInicio === periodo.inicio){
    return { manual:true, fechaInicio: "registrado manualmente por RH" };
  }

  return state.requests.find(r=>
    r.nomina===nomina && r.solicitaPrima && r.estado!=="rechazado" &&
    r.fechaInicio>=periodo.inicio && r.fechaInicio<=periodo.fin
  ) || null;
}

async function handleNuevaSolicitud(e){
  e.preventDefault();
  const fi = document.getElementById("fi").value;
  const ff = document.getElementById("ff").value;
  const comentario = document.getElementById("comentario").value.trim();
  const errBox = document.getElementById("reqError");
  errBox.innerHTML = "";

  try{
    const minInicio = addDaysStr(todayStr(), DIAS_ANTICIPACION);
    if(fi < minInicio){
      errBox.innerHTML = `<div class="error-box">Las solicitudes deben hacerse con al menos ${DIAS_ANTICIPACION} días de anticipación. La fecha de inicio más próxima que puedes elegir es ${minInicio}.</div>`;
      return;
    }
    const dias = diasHabilesEntre(fi,ff, fechaNacimientoDe(state.user.nomina));
    if(dias<=0){
      errBox.innerHTML = `<div class="error-box">Revisa las fechas: la fecha de fin debe ser igual o posterior a la de inicio, y el rango debe incluir al menos un día hábil.</div>`;
      return;
    }
    const b = balanceDe(state.user.nomina);
    const emp = state.employees.find(e=>e.nomina===state.user.nomina);
    let esAdelanto = false, diasAdelanto = 0, adelantoParaPeriodoInicio = null;
    if(dias > b.restantes){
      const excedente = dias - b.restantes;
      const ventana = ventanaAdelanto(emp.fechaIngreso);
      if(!ventana.enVentana){
        errBox.innerHTML = `<div class="error-box">Solo tienes ${b.restantes} día(s) disponibles y estás solicitando ${dias}.</div>`;
        return;
      }
      const yaAdelantado = adelantoTomadoPara(state.user.nomina, ventana.proximoInicio);
      if(yaAdelantado + excedente > DIAS_MAX_ADELANTO){
        errBox.innerHTML = `<div class="error-box">Solo tienes ${b.restantes} día(s) disponibles. Puedes adelantar hasta ${DIAS_MAX_ADELANTO} días de tu siguiente periodo (ya llevas ${yaAdelantado} adelantados), pero esta solicitud necesitaría ${excedente}.</div>`;
        return;
      }
      esAdelanto = true;
      diasAdelanto = excedente;
      adelantoParaPeriodoInicio = ventana.proximoInicio;
    }
    const primaCheckbox = document.getElementById("solicitaPrima");
    let solicitaPrima = false, diasPrimaVacacional = 0;
    if(primaCheckbox && primaCheckbox.checked){
      if(primaYaSolicitadaEstePeriodo(state.user.nomina)){
        errBox.innerHTML = `<div class="error-box">Ya solicitaste tu prima vacacional este periodo; solo se puede una vez.</div>`;
        return;
      }
      solicitaPrima = true;
      diasPrimaVacacional = Math.round(b.totales * 0.25 * 100)/100;
    }
    await addDoc(collection(db,"requests"), {
      nomina: state.user.nomina,
      nombreEmpleado: state.user.nombre,
      fechaInicio: fi, fechaFin: ff, diasHabiles: dias,
      solicitaPrima, diasPrimaVacacional,
      esAdelanto, diasAdelanto, adelantoParaPeriodoInicio,
      estado: "pendiente", comentarioEmpleado: comentario, comentarioAdmin:"",
      fechaSolicitud: serverTimestamp()
    });
    state.reqFeedback = `Tu solicitud del ${fi} al ${ff} (${dias} día${dias===1?"":"s"} hábil${dias===1?"":"es"}${esAdelanto? `, de los cuales ${diasAdelanto} son adelanto de tu siguiente periodo`:""}${solicitaPrima? `, + prima vacacional de ${diasPrimaVacacional} días`:""}) fue enviada y está pendiente de aprobación. La verás abajo en "Tus solicitudes".`;
    render();
  }catch(err){
    errBox.innerHTML = `<div class="error-box">No se pudo enviar la solicitud: ${err.message}</div>`;
  }
}

            </td>
          </tr>`;
        }).join("")}
        </tbody>
      </table>
      <p class="hint">* días ajustados manualmente por RH (total anual fijo, no calculado por antigüedad). ⚙ ajuste de días restantes vigente para el periodo actual del empleado (dejará de aplicar automáticamente en su próximo aniversario). Los administradores no acumulan ni solicitan días, por eso muestran "—".</p>
      `}
    </div>`;
  document.getElementById("newEmpBtn").addEventListener("click", ()=>renderEmpForm(null));
  document.getElementById("manageCatBtn").addEventListener("click", ()=>renderCatForm());
  document.getElementById("manageDeptBtn").addEventListener("click", ()=>renderDeptForm());
  container.querySelectorAll("[data-edit]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const emp = state.employees.find(e=>e.nomina===btn.dataset.edit);
      renderEmpForm(emp);
    });
  });
  container.querySelectorAll("[data-del]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(confirm(`¿Eliminar al empleado con nómina ${btn.dataset.del}? Esto no borra su historial de solicitudes.`)){
        await deleteDoc(doc(db,"employees",btn.dataset.del));
      }
    });
  });
}

      const actual = categoriasDisponibles().filter(c=>c!==cat);

function renderEmpForm(emp){
  const wrap = document.getElementById("empFormWrap");
  const esNuevo = !emp;
  const fechaActual = emp?.fechaIngreso || "";
  const periodoPreview = fechaActual ? calcularPeriodoActual(fechaActual) : null;
  const ajusteVigente = emp && periodoPreview && emp.diasRestantesIniciales!==null && emp.diasRestantesIniciales!==undefined
    && emp.diasRestantesInicialesPeriodoInicio === periodoPreview.inicio;
  const ajusteVencido = emp && emp.diasRestantesIniciales!==null && emp.diasRestantesIniciales!==undefined && !ajusteVigente;
  const primaPagadaVigente = emp && periodoPreview && emp.primaPagadaManual && emp.primaPagadaManualPeriodoInicio === periodoPreview.inicio;
  const primaPagadaVencida = emp && emp.primaPagadaManual && !primaPagadaVigente;

  wrap.innerHTML = `
    <div class="card" style="background:var(--accent-soft);border:none;margin-bottom:20px;">
      <h3>${esNuevo? "Nuevo empleado" : "Editar empleado"}</h3>
      <form id="empForm">
        <div class="field-row">
          <div>
            <label>Número de nómina</label>
            <input class="mono-input" id="f_nomina" value="${emp?.nomina||""}" ${esNuevo?"":"disabled"} required />
          </div>
          <div>
            <label>Nombre completo</label>
            <input id="f_nombre" value="${emp?.nombre||""}" required />
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Fecha de ingreso</label>
            <input type="date" id="f_fecha" value="${fechaActual}" required />
          </div>
          <div>
            <label>Fecha de nacimiento (opcional)</label>
            <input type="date" id="f_nacimiento" value="${emp?.fechaNacimiento||""}" />
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Días anuales manuales (opcional)</label>
            <input type="number" min="0" id="f_manual" value="${emp?.diasManual ?? ""}" placeholder="Dejar vacío = calculado" />
          </div>
        </div>
        <p class="hint">La fecha de nacimiento se puede dejar en blanco y agregar después; el día de su cumpleaños no se cuenta como día hábil para ese empleado.</p>
        <label>Categoría</label>
        <select id="f_categoria" required>
          <option value="" ${emp?.categoria? "" : "selected"} disabled>Selecciona una categoría…</option>
          ${categoriasDisponibles().map(c=>`<option value="${c}" ${emp?.categoria===c?"selected":""}>${c}</option>`).join("")}
        </select>
        <p class="hint">Se usa para colorear el calendario y avisar si dos personas de la misma categoría piden las mismas fechas.</p>

        <label>Departamento</label>
        <select id="f_departamento" required>
          <option value="" ${emp?.departamento? "" : "selected"} disabled>Selecciona un departamento…</option>
          ${departamentosDisponibles().map(d=>`<option value="${d}" ${emp?.departamento===d?"selected":""}>${d}</option>`).join("")}
        </select>
        <p class="hint">Es distinto de la categoría; este es el que aparece en la boleta de vacaciones.</p>

        <label>Días restantes en su periodo actual (opcional)</label>
        <input type="number" min="0" id="f_restantes" value="${emp?.diasRestantesIniciales ?? ""}" placeholder="Dejar vacío = sin ajuste manual" />
        <p class="hint" id="periodoHint"></p>
        ${ajusteVigente? `<p class="hint" style="color:var(--accent-dark);">⚙ Ajuste activo para el periodo vigente.</p>` : ""}
        ${ajusteVencido? `<p class="hint" style="color:var(--warm);">Este empleado tenía un ajuste, pero era de un periodo anterior; ya no se está aplicando (el sistema ya calcula el periodo actual de forma automática). Si quieres corregir el periodo actual, vuelve a escribir el número de días restantes.</p>` : ""}
        <p class="hint">Anota cuántos días le <strong>quedan</strong> por tomar en su periodo actual (no el total). Úsalo solo la primera vez que registras a alguien que ya había tomado vacaciones antes de usar este sistema. Este ajuste solo aplica al periodo vigente; cuando termine (en su próximo aniversario), el sistema vuelve a calcular automático sin que tengas que hacer nada.</p>

        <label style="display:flex;align-items:center;gap:8px;margin-top:16px;text-transform:none;">
          <input type="checkbox" id="f_primaPagada" style="width:auto;" ${primaPagadaVigente?"checked":""} />
          <span style="font-weight:600;font-size:13.5px;color:var(--ink);">Ya se le pagó su prima vacacional de este periodo (fuera del sistema)</span>
        </label>
        ${primaPagadaVigente? `<p class="hint" style="color:var(--accent-dark);">⚙ Marcada como pagada para el periodo vigente: no se le ofrecerá la opción de volver a solicitarla hasta el siguiente periodo.</p>` : ""}
        ${primaPagadaVencida? `<p class="hint" style="color:var(--warm);">Tenía una marca de prima pagada, pero era de un periodo anterior; ya no aplica (se renovó solo). Si ya le pagaste la de este nuevo periodo, vuelve a marcar la casilla y guarda.</p>` : ""}
        <p class="hint">Márcala solo si ya se le pagó la prima de este periodo por fuera de una solicitud (por ejemplo, antes de usar el sistema). Esto evita que aparezca la opción de solicitarla de nuevo hasta su siguiente periodo, cuando se libera sola.</p>

        <label style="display:flex;align-items:center;gap:8px;margin-top:16px;text-transform:none;">
          <input type="checkbox" id="f_admin" style="width:auto;" ${emp?.isAdmin?"checked":""} />
          <span style="font-weight:600;font-size:13.5px;color:var(--ink);">Es administrador</span>
        </label>
        <p class="hint">Los administradores no solicitan vacaciones dentro del sistema, así que no se les calculan días.</p>
        ${esNuevo? `<p class="hint">La contraseña la elige el propio empleado la primera vez que inicia sesión con este número de nómina.</p>`:""}
        <div id="empFormError"></div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn-primary" style="width:auto;margin:0;" type="submit">${esNuevo?"Crear":"Guardar cambios"}</button>
          <button class="btn-ghost" type="button" id="cancelEmpForm">Cancelar</button>
        </div>
      </form>
    </div>`;
  document.getElementById("cancelEmpForm").addEventListener("click", ()=>{wrap.innerHTML="";});
  const fechaInput = document.getElementById("f_fecha");
  function actualizarPeriodoHint(){
    const hint = document.getElementById("periodoHint");
    if(fechaInput.value){
      const p = calcularPeriodoActual(fechaInput.value);
      hint.textContent = `Periodo vigente de este empleado: ${p.inicio} a ${p.fin}.`;
    } else {
      hint.textContent = "";
    }
  }
  actualizarPeriodoHint();
  fechaInput.addEventListener("change", actualizarPeriodoHint);
  document.getElementById("empForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const nomina = document.getElementById("f_nomina").value.trim();
    const nombre = document.getElementById("f_nombre").value.trim();
    const fecha = document.getElementById("f_fecha").value;
    const fechaNacimientoRaw = document.getElementById("f_nacimiento").value;
    const fechaNacimiento = fechaNacimientoRaw === "" ? null : fechaNacimientoRaw;
    const manualRaw = document.getElementById("f_manual").value;
    const diasManual = manualRaw===""? null : Number(manualRaw);
    const categoria = document.getElementById("f_categoria").value;
    const departamento = document.getElementById("f_departamento").value;
    const restantesRaw = document.getElementById("f_restantes").value;
    let diasRestantesIniciales = null, diasRestantesInicialesPeriodoInicio = null;
    if(restantesRaw !== ""){
      diasRestantesIniciales = Number(restantesRaw);
      diasRestantesInicialesPeriodoInicio = calcularPeriodoActual(fecha).inicio;
    }
    const isAdmin = document.getElementById("f_admin").checked;
    const primaPagadaManual = document.getElementById("f_primaPagada").checked;
    const primaPagadaManualPeriodoInicio = primaPagadaManual ? calcularPeriodoActual(fecha).inicio : null;
    const errBox = document.getElementById("empFormError");
    try{
      if(esNuevo){
        const existSnap = await getDoc(doc(db,"employees",nomina));
        if(existSnap.exists()){
          errBox.innerHTML = `<div class="error-box">Ya existe un empleado con esa nómina.</div>`;
          return;
        }
        await setDoc(doc(db,"employees",nomina), {nomina, nombre, fechaIngreso:fecha, fechaNacimiento, diasManual, categoria, departamento, diasRestantesIniciales, diasRestantesInicialesPeriodoInicio, primaPagadaManual, primaPagadaManualPeriodoInicio, isAdmin, activo:true});
      } else {
        await updateDoc(doc(db,"employees",nomina), {nombre, fechaIngreso:fecha, fechaNacimiento, diasManual, categoria, departamento, diasRestantesIniciales, diasRestantesInicialesPeriodoInicio, primaPagadaManual, primaPagadaManualPeriodoInicio, isAdmin});
      }
      wrap.innerHTML="";
    }catch(err){
      errBox.innerHTML = `<div class="error-box">${err.message}</div>`;
    }
  });
}

function renderEditReqForm(req){
  const wrap = document.getElementById("editReqFormWrap");
  wrap.innerHTML = `
    <div class="card" style="background:var(--accent-soft);border:none;">
      <h3>Editar solicitud de ${req.nombreEmpleado}</h3>
      <p class="hint">Estatus actual: <span class="status ${req.estado}">${req.estado.toUpperCase()}</span>. Ajusta las fechas para aumentar o disminuir los días; el saldo del empleado se recalcula solo.</p>
      <form id="editReqForm">
        <div class="field-row">
          <div>
            <label>Fecha de inicio</label>
            <input type="date" id="e_fi" value="${req.fechaInicio}" required />
          </div>
          <div>
            <label>Fecha de fin</label>
            <input type="date" id="e_ff" value="${req.fechaFin}" required />
          </div>
        </div>
        <div id="editDiasPreview" class="hint" style="font-weight:600;color:var(--accent-dark);"></div>
        <div id="editReqError"></div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn-primary" style="width:auto;margin:0;" type="submit">Guardar cambios</button>
          <button class="btn-ghost" type="button" id="cancelEditReq">Cancelar</button>
        </div>
      </form>
    </div>`;
  const fiInput = document.getElementById("e_fi");
  const ffInput = document.getElementById("e_ff");
  function actualizarPreview(){
    const dias = diasHabilesEntre(fiInput.value, ffInput.value, fechaNacimientoDe(req.nomina));
    document.getElementById("editDiasPreview").textContent = dias>0
      ? `Nuevo total: ${dias} día${dias===1?"":"s"} hábil${dias===1?"":"es"} (antes eran ${req.diasHabiles}).`
      : "Revisa las fechas: no hay ningún día hábil en ese rango.";
  }
  actualizarPreview();
  fiInput.addEventListener("change", actualizarPreview);
  ffInput.addEventListener("change", actualizarPreview);
  document.getElementById("cancelEditReq").addEventListener("click", ()=>{wrap.innerHTML="";});
  document.getElementById("editReqForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const fi = fiInput.value, ff = ffInput.value;
    const errBox = document.getElementById("editReqError");
    const dias = diasHabilesEntre(fi, ff, fechaNacimientoDe(req.nomina));
    if(dias<=0){
      errBox.innerHTML = `<div class="error-box">Revisa las fechas: la fecha de fin debe ser igual o posterior a la de inicio, y el rango debe incluir al menos un día hábil.</div>`;
      return;
    }
    if(req.estado==="aprobado"){
      const cat = categoriaDe(req.nomina);
      if(cat){
        const enConflicto = state.requests.filter(r=>
          r.id!==req.id && r.estado==="aprobado" && r.nomina!==req.nomina &&
          categoriaDe(r.nomina)===cat && fi<=r.fechaFin && r.fechaInicio<=ff
        );
        if(enConflicto.length>0){
          const detalle = enConflicto.map(r=>`- ${r.nombreEmpleado} (${r.fechaInicio} a ${r.fechaFin})`).join("\n");
          if(!confirm(`Aviso: con estas nuevas fechas se cruza con otra persona de la misma categoría "${cat}":\n\n${detalle}\n\n¿Guardar de todas formas?`)) return;
        }
      }
    }
    await updateDoc(doc(db,"requests",req.id), {fechaInicio:fi, fechaFin:ff, diasHabiles:dias});
    wrap.innerHTML="";
  });
}

async function borrarSolicitud(id){
  if(confirm("¿Eliminar esta solicitud? Esta acción no se puede deshacer.")){
    await deleteDoc(doc(db,"requests",id));
  }
}

async function borrarTodoElHistorial(resueltas){
  if(!confirm(`¿Eliminar las ${resueltas.length} solicitudes resueltas (aprobadas/rechazadas)? Esta acción no se puede deshacer.`)) return;
  for(const r of resueltas){
    await deleteDoc(doc(db,"requests",r.id));
  }
}

async function resolverSolicitud(id, estado){
  const req = state.requests.find(r=>r.id===id);
  let comentarioAdmin = "";
  if(estado==="rechazado"){
    comentarioAdmin = prompt("Motivo del rechazo (opcional):") || "";
  }
  if(estado==="aprobado" && req){
    const cat = categoriaDe(req.nomina);
    if(cat){
      const enConflicto = state.requests.filter(r=>
        r.id!==id && r.estado==="aprobado" && r.nomina!==req.nomina &&
        categoriaDe(r.nomina)===cat &&
        r.fechaInicio<=req.fechaFin && req.fechaInicio<=r.fechaFin
      );
      if(enConflicto.length>0){
        const detalle = enConflicto.map(r=>`- ${r.nombreEmpleado} (${r.fechaInicio} a ${r.fechaFin})`).join("\n");
        const continuar = confirm(`Aviso: ya hay vacaciones aprobadas de la misma categoría "${cat}" en fechas que se cruzan:\n\n${detalle}\n\n¿Aprobar de todas formas?`);
        if(!continuar) return;
      }
    }
  }
  await updateDoc(doc(db,"requests",id), {estado, comentarioAdmin});
}

/* ================= Boleta de vacaciones en PDF ================= */
function dibujarIconoMarca(doc, x, y, size, colorRGB){
  const s = size;
  doc.setLineWidth(s*0.16);
  doc.setDrawColor(colorRGB[0], colorRGB[1], colorRGB[2]);
  doc.setLineCap("square");
  // esquina superior izquierda
  doc.line(x, y+s*0.36, x, y);
  doc.line(x, y, x+s*0.36, y);
  // esquina superior derecha
  doc.line(x+s*0.64, y, x+s, y);
  doc.line(x+s, y, x+s, y+s*0.36);
  // esquina inferior derecha
  doc.line(x+s, y+s*0.64, x+s, y+s);
  doc.line(x+s, y+s, x+s*0.64, y+s);
  // esquina inferior izquierda
  doc.line(x+s*0.36, y+s, x, y+s);
  doc.line(x, y+s, x, y+s*0.64);
}

const COLOR_BOLETA = [41,111,153]; // azul de la boleta original

function escribirSegmentos(doc, x, y, segments, tamano){
  let curX = x;
  segments.forEach(seg=>{
    doc.setFont("helvetica", seg.bold?"bold":"normal");
    doc.setFontSize(tamano);
    if(seg.text !== undefined){
      doc.text(seg.text, curX, y);
      curX += doc.getTextWidth(seg.text) + 1.3;
    } else if(seg.blank !== undefined){
      const val = String(seg.blank);
      const valWidth = doc.getTextWidth(val);
      const lineWidth = Math.max(valWidth+4, seg.minWidth||16);
      doc.text(val, curX + (lineWidth-valWidth)/2, y-0.8);
      doc.setLineWidth(0.25);
      doc.line(curX, y+1, curX+lineWidth, y+1);
      curX += lineWidth + 1.8;
    }
  });
  return curX;
}

function construirBoletaPDF(req, emp){
  const { jsPDF } = window.jspdf;
  // Media carta (5.5 x 8.5 in), tamaño estándar de la boleta física
  const doc = new jsPDF({ unit:"mm", format:[139.7, 215.9] });
  const marginL = 11, marginR = 11;
  const pageWidth = doc.internal.pageSize.getWidth();
  let y = 15;
  const C = COLOR_BOLETA;
  doc.setTextColor(C[0],C[1],C[2]);
  doc.setDrawColor(C[0],C[1],C[2]);
  const F = 8.5; // tamaño de letra del cuerpo, ajustado para que quepa en media carta

  const hoy = new Date();
  const fi = new Date(req.fechaInicio+"T00:00:00");
  const ff = new Date(req.fechaFin+"T00:00:00");
  const periodo = calcularPeriodoActual(emp.fechaIngreso);
  const b = balanceDe(req.nomina);
  const primaEste = req.solicitaPrima ? req.diasPrimaVacacional : 0;
  const primaTotalPeriodo = Math.round(0.25 * (b.totales||0) * 100)/100;
  const primaPendiente = req.solicitaPrima ? 0 : primaTotalPeriodo;
  const ordinal = periodo.anios;

  // El "año de servicio" que corresponde es el que YA se cumplió (ej. si
  // ingresó en 2025 y hoy cumple 1 año, debe decir "primer año... que
  // comprende del 2025 al 2026"), no el periodo que apenas comienza.
  const servicioInicio = new Date(fechaAniversario(emp.fechaIngreso, ordinal-1)+"T00:00:00");
  const servicioFin = new Date(fechaAniversario(emp.fechaIngreso, ordinal)+"T00:00:00");

  // Encabezado: título a la izquierda, logo "sultana" (con el cuadro a la derecha)
  doc.setFont("helvetica","bold"); doc.setFontSize(12);
  doc.text("BOLETA DE VACACIONES", marginL, y);
  doc.setFontSize(10.5);
  const textoMarcaAncho = doc.getTextWidth("sultana");
  const iconSize = 5.5, gapMarca = 1;
  const marcaX = pageWidth - marginR - (textoMarcaAncho + gapMarca + iconSize);
  doc.text("sultana", marcaX, y-0.5);
  dibujarIconoMarca(doc, marcaX+textoMarcaAncho+gapMarca, y-5, iconSize, C);
  y += 9;

  escribirSegmentos(doc, marginL, y, [
    {text:"Santa Catarina, N.L. a "},
    {blank: hoy.getDate(), minWidth:8},
    {text:" de "},
    {blank: MESES[hoy.getMonth()], minWidth:18},
    {text:" de "},
    {blank: hoy.getFullYear(), minWidth:14},
  ], F);
  y += 9;

  doc.setFont("helvetica","normal"); doc.setFontSize(F);
  doc.text("Departamento de Personal:", marginL, y); y += 6;
  doc.text("Presente:", marginL, y); y += 8;

  // Cuerpo: líneas cortas para que quepan en el ancho de media carta
  escribirSegmentos(doc, marginL, y, [
    {text:"Hacemos de su conocimiento que del día"},
    {blank: fi.getDate(), minWidth:8},
  ], F); y += 6.5;

  escribirSegmentos(doc, marginL, y, [
    {text:"de"}, {blank: MESES[fi.getMonth()], minWidth:18},
    {text:"al día"}, {blank: ff.getDate(), minWidth:8},
  ], F); y += 6.5;

  escribirSegmentos(doc, marginL, y, [
    {text:"de"}, {blank: MESES[ff.getMonth()], minWidth:18},
    {text:"de"}, {blank: ff.getFullYear(), minWidth:14},
  ], F); y += 6.5;

  escribirSegmentos(doc, marginL, y, [
    {text:"el Sr./Sra."}, {blank: req.nombreEmpleado, minWidth:55},
  ], F); y += 6.5;

  escribirSegmentos(doc, marginL, y, [
    {text:"No."}, {blank: req.nomina, minWidth:14},
    {text:"del Departamento de"}, {blank: departamentoDe(req.nomina)||"—", minWidth:28},
  ], F); y += 6.5;

  doc.setFont("helvetica","normal"); doc.setFontSize(F);
  doc.text(", disfrutará de sus vacaciones", marginL, y); y += 6.5;

  escribirSegmentos(doc, marginL, y, [
    {text:"correspondientes al"}, {blank: `${ordinalTexto(ordinal)} año`, minWidth:24},
  ], F); y += 6.5;

  doc.text("de sus servicios prestados y que comprende", marginL, y); y += 6.5;

  escribirSegmentos(doc, marginL, y, [
    {text:"del mes de"}, {blank: MESES[servicioInicio.getMonth()], minWidth:18},
    {text:"de"}, {blank: servicioInicio.getFullYear(), minWidth:14},
  ], F); y += 6.5;

  escribirSegmentos(doc, marginL, y, [
    {text:"al mes de"}, {blank: MESES[servicioFin.getMonth()], minWidth:18},
    {text:"de"}, {blank: servicioFin.getFullYear(), minWidth:14},
  ], F); y += 10;

  escribirSegmentos(doc, marginL, y, [
    {text:"Disfrutará:"}, {blank: req.diasHabiles, minWidth:10},
    {text:"días de Vacaciones, y"}, {blank: primaEste, minWidth:10},
    {text:"días de"},
  ], F); y += 6.5;
  doc.text("Prima de Vacaciones", marginL, y); y += 8;

  escribirSegmentos(doc, marginL, y, [
    {text:"Pendiente:"}, {blank: b.restantes, minWidth:10},
    {text:"días de Vacaciones, y"}, {blank: primaPendiente, minWidth:10},
    {text:"días de"},
  ], F); y += 6.5;
  doc.text("Prima de Vacaciones", marginL, y); y += 18;

  doc.setLineWidth(0.3);
  doc.line(marginL, y, marginL+50, y);
  doc.line(pageWidth-marginR-50, y, pageWidth-marginR, y);
  y += 4.5;
  doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text("Firma de Enterado", marginL+3, y);
  doc.text("Aprobado por Jefe del Depto.", pageWidth-marginR-50, y);

  return doc;
}

function imprimirBoletaPDF(reqId){
  const req = state.requests.find(r=>r.id===reqId);
  const emp = state.employees.find(e=>e.nomina===req.nomina);
  if(!req || !emp){ alert("No se encontró la información necesaria para la boleta."); return; }
  const doc = construirBoletaPDF(req, emp);
  doc.autoPrint();
  const blobUrl = doc.output("bloburl");
  window.open(blobUrl, "_blank");
}

function descargarBoletaPDF(reqId){
  const req = state.requests.find(r=>r.id===reqId);
  const emp = state.employees.find(e=>e.nomina===req.nomina);
  if(!req || !emp){ alert("No se encontró la información necesaria para la boleta."); return; }
  const doc = construirBoletaPDF(req, emp);
  doc.save(`Boleta_${req.nomina}_${req.fechaInicio}.pdf`);
}

function construirCalendarioMes(year, month){
  const pad = n=>String(n).padStart(2,"0");
  const primerDia = new Date(year,month,1).getDay();
  const diasEnMes = new Date(year,month+1,0).getDate();
  const aprobadas = state.requests.filter(r=>r.estado==="aprobado");
  const finMes = `${year}-${pad(month+1)}-${pad(diasEnMes)}`;
  const inicioMes = `${year}-${pad(month+1)}-01`;

  // Conflictos: pares de solicitudes aprobadas, de empleados distintos,
  // con la misma categoría, cuyas fechas se cruzan en algún punto de este mes.
  const enEsteMes = aprobadas.filter(r=>r.fechaInicio<=finMes && r.fechaFin>=inicioMes)
    .sort((a,b)=>a.fechaInicio.localeCompare(b.fechaInicio));
  const conflictos = [];
  const diasConConflicto = new Set();
  for(let i=0;i<enEsteMes.length;i++){
    for(let j=i+1;j<enEsteMes.length;j++){
      const a=enEsteMes[i], b=enEsteMes[j];
      if(a.nomina===b.nomina) continue;
      const catA = categoriaDe(a.nomina), catB = categoriaDe(b.nomina);
      if(!catA || catA!==catB) continue;
      const inicioSolape = a.fechaInicio > b.fechaInicio ? a.fechaInicio : b.fechaInicio;
      const finSolape = a.fechaFin < b.fechaFin ? a.fechaFin : b.fechaFin;
      if(inicioSolape<=finSolape){
        conflictos.push({categoria:catA, a, b, inicioSolape, finSolape});
        let cur = new Date(inicioSolape+"T00:00:00");
        const fin = new Date(finSolape+"T00:00:00");
        while(cur<=fin){ diasConConflicto.add(`${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`); cur.setDate(cur.getDate()+1); }
      }
    }
  }

  let celdas = "";
  for(let i=0;i<primerDia;i++) celdas += `<div class="cal-cell cal-empty"></div>`;
  for(let d=1; d<=diasEnMes; d++){
    const dateStr = `${year}-${pad(month+1)}-${pad(d)}`;
    const matches = aprobadas.filter(r=>r.fechaInicio<=dateStr && r.fechaFin>=dateStr);
    const nombres = matches.map(r=>`${r.nombreEmpleado}${categoriaDe(r.nomina)?` (${categoriaDe(r.nomina)})`:""}`).join(", ");
    const tieneConflicto = diasConConflicto.has(dateStr);
    const dots = matches.slice(0,5).map(r=>`<span class="cal-dot" style="background:${colorCategoria(categoriaDe(r.nomina))}"></span>`).join("");
    const festivoNombre = nombreFestivoOficial(dateStr);
    const cumples = empleadosCumpleaniosEnDia(dateStr);
    const esEspecial = festivoNombre || cumples.length>0;
    const tituloPartes = [];
    if(festivoNombre) tituloPartes.push(`Día festivo: ${festivoNombre}`);
    if(cumples.length>0) tituloPartes.push(`Cumpleaños: ${cumples.map(e=>e.nombre).join(", ")}`);
    if(nombres) tituloPartes.push(nombres);
    if(tieneConflicto) tituloPartes.push("¡conflicto de categoría!");
    const claseEspecial = festivoNombre ? 'cal-festivo-oficial' : (cumples.length>0 ? 'cal-cumple' : '');
    celdas += `
      <div class="cal-cell ${matches.length>0?'cal-hasvac':''} ${tieneConflicto?'cal-conflict':''} ${claseEspecial}" ${tituloPartes.length>0?`title="${tituloPartes.join(" · ").replace(/"/g,'')}"`:""}>
        <div class="cal-daynum">${d}</div>
        ${claseEspecial? `<div class="cal-festivo-marker">${festivoNombre? "🎌" : "🎂"}</div>` : ""}
        ${matches.length>0? `<div style="position:absolute;bottom:4px;left:5px;display:flex;gap:2px;">${dots}</div>`:""}
        ${matches.length>0? `<div class="cal-badge" style="${tieneConflicto?'background:var(--danger);':''}">${matches.length}</div>`:""}
      </div>`;
  }

  // Festivos oficiales y cumpleaños dentro de este mes, para la leyenda
  const festivosDelMes = [];
  for(let d=1; d<=diasEnMes; d++){
    const dateStr = `${year}-${pad(month+1)}-${pad(d)}`;
    const festivoNombre = nombreFestivoOficial(dateStr);
    if(festivoNombre) festivosDelMes.push({fecha:dateStr, texto:festivoNombre, icono:"🎌"});
    empleadosCumpleaniosEnDia(dateStr).forEach(e=>festivosDelMes.push({fecha:dateStr, texto:`Cumpleaños de ${e.nombre}`, icono:"🎂"}));
  }
  festivosDelMes.sort((a,b)=>a.fecha.localeCompare(b.fecha));

  return `
    <div class="cal-grid">
      ${DIAS_SEMANA.map(d=>`<div class="cal-cell cal-head">${d}</div>`).join("")}
      ${celdas}
    </div>
    ${festivosDelMes.length>0? `
      <div class="cal-legend" style="margin-top:14px;">
        ${festivosDelMes.map(f=>`
          <div class="cal-legend-item">
            <span>${f.icono} ${f.texto}</span>
            <span class="num">${f.fecha}</span>
          </div>`).join("")}
      </div>` : ""}
    ${conflictos.length>0 ? `
      <div style="margin-top:16px;">
        <h3 style="font-size:14.5px;color:var(--danger);">⚠ Conflictos de categoría este mes</h3>
        ${conflictos.map(c=>`
          <div class="conflict-item">
            Misma categoría <strong>"${c.categoria}"</strong>: <strong>${c.a.nombreEmpleado}</strong> (${c.a.fechaInicio} a ${c.a.fechaFin}) y <strong>${c.b.nombreEmpleado}</strong> (${c.b.fechaInicio} a ${c.b.fechaFin}) se cruzan del ${c.inicioSolape} al ${c.finSolape}.
          </div>`).join("")}
      </div>` : ""}
    <div class="cal-legend">
      ${enEsteMes.length===0? `<div class="empty">Nadie tiene vacaciones aprobadas este mes.</div>` : enEsteMes.map(r=>`
        <div class="cal-legend-item">
          <span><span class="cal-dot" style="background:${colorCategoria(categoriaDe(r.nomina))};margin-right:6px;"></span>${r.nombreEmpleado}${categoriaDe(r.nomina)?` · ${categoriaDe(r.nomina)}`:""}</span>
          <span class="num">${r.fechaInicio} → ${r.fechaFin}</span>
        </div>`).join("")}
    </div>`;
}

function renderTabReportes(container){
  const anioActual = new Date().getFullYear();
  if(!state.reportYear) state.reportYear = anioActual;
  if(state.reportMonth===undefined || state.reportMonth===null) state.reportMonth = new Date().getMonth();
  const anio = state.reportYear;
  const mes = state.reportMonth;

  const aprobadas = state.requests.filter(r=>r.estado==="aprobado" && r.fechaInicio && r.fechaInicio.startsWith(String(anio)));

  // por mes
  const porMes = new Array(12).fill(0);
  aprobadas.forEach(r=>{
    const m = new Date(r.fechaInicio+"T00:00:00").getMonth();
    porMes[m]+=r.diasHabiles;
  });
  const maxMes = Math.max(1,...porMes);

  // por semana fiscal (número de semana ISO), solo de las semanas que caen
  // dentro del mes que se está viendo arriba en el calendario
  const porSemana = {};
  aprobadas.forEach(r=>{
    const w = isoWeek(r.fechaInicio);
    porSemana[w] = (porSemana[w]||0) + r.diasHabiles;
  });
  const diasEnMesSel = new Date(anio, mes+1, 0).getDate();
  const semanasDelMes = new Set();
  for(let d=1; d<=diasEnMesSel; d++){
    semanasDelMes.add(isoWeek(`${anio}-${pad2(mes+1)}-${pad2(d)}`));
  }
  const semanasOrdenadas = Object.keys(porSemana).map(Number).filter(w=>semanasDelMes.has(w)).sort((a,b)=>a-b);

  const aniosConDatos = [...new Set(state.requests.map(r=>r.fechaInicio? r.fechaInicio.slice(0,4):null).filter(Boolean))].map(Number);
  const rangoAnios = [];
  for(let y=anioActual-2; y<=anioActual+4; y++) rangoAnios.push(y);
  const anios = [...new Set([...rangoAnios, ...aniosConDatos, anioActual])].sort((a,b)=>a-b).map(String);

  container.innerHTML = `
    <div class="card">
      <div class="toolbar">
        <h3 style="margin:0;">Calendario de vacaciones</h3>
        <div style="display:flex;gap:8px;">
          <select id="monthSelect" style="width:auto;">
            ${MESES.map((m,i)=>`<option value="${i}" ${i===mes?"selected":""}>${m}</option>`).join("")}
          </select>
          <select id="yearSelectCal" style="width:auto;">
            ${anios.map(a=>`<option value="${a}" ${Number(a)===anio?"selected":""}>${a}</option>`).join("")}
          </select>
        </div>
      </div>
      ${construirCalendarioMes(anio, mes)}
    </div>

    <div class="card">
      <h3>Días aprobados por semana fiscal (${MESES[mes]} ${anio})</h3>
      ${semanasOrdenadas.length===0? `<div class="empty">No hay vacaciones aprobadas registradas en ${MESES[mes]} ${anio}.</div>` : `
      <table>
        <thead><tr><th>Semana del año</th><th>Días tomados (todos los empleados)</th></tr></thead>
        <tbody>
        ${semanasOrdenadas.map(w=>`<tr><td class="num">Semana ${w}</td><td class="num">${porSemana[w]}</td></tr>`).join("")}
        </tbody>
      </table>`}
    </div>

    <div class="card">
      <div class="toolbar">
        <h3 style="margin:0;">Días de vacaciones aprobados por mes</h3>
        <select id="yearSelect" style="width:auto;">
          ${anios.map(a=>`<option value="${a}" ${Number(a)===anio?"selected":""}>${a}</option>`).join("")}
        </select>
      </div>
      <div class="month-bar-wrap">
        ${MESES.map((m,i)=>`
          <div class="month-bar-row">
            <div class="month-bar-label">${m}</div>
            <div class="month-bar-track"><div class="month-bar-fill" style="width:${(porMes[i]/maxMes*100).toFixed(0)}%"></div></div>
            <div class="month-bar-value">${porMes[i]}</div>
          </div>`).join("")}
      </div>
    </div>

    <div class="card">
      <h3>Resumen por empleado</h3>
      <table>
        <thead><tr><th>Nómina</th><th>Nombre</th><th>Categoría</th><th>Antigüedad</th><th>Días totales</th><th>Días tomados</th><th>Restantes</th></tr></thead>
        <tbody>
        ${state.employees.map(emp=>{
          const b = balanceDe(emp.nomina);
          if(b.esAdmin){
            return `<tr><td class="num">${emp.nomina}</td><td>${emp.nombre}</td><td>${emp.categoria||"—"}</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num">—</td></tr>`;
          }
          return `<tr>
            <td class="num">${emp.nomina}</td>
            <td>${emp.nombre}</td>
            <td>${emp.categoria||"—"}</td>
            <td class="num">${b.antig}a</td>
            <td class="num">${b.totales}</td>
            <td class="num">${b.tomados}${b.ajustado?" ⚙":""}</td>
            <td class="num">${b.restantes}</td>
          </tr>`;
        }).join("")}
        </tbody>
      </table>
    </div>`;

  document.getElementById("yearSelect").addEventListener("change",(e)=>{
    state.reportYear = Number(e.target.value);
    renderTabReportes(container);
  });
  document.getElementById("monthSelect").addEventListener("change",(e)=>{
    state.reportMonth = Number(e.target.value);
    renderTabReportes(container);
  });
  document.getElementById("yearSelectCal").addEventListener("change",(e)=>{
    state.reportYear = Number(e.target.value);
    renderTabReportes(container);
  });
}

/* ================= Arranque ================= */
if(!CONFIG_PENDING){
  watchAuth();
} else {
  render();
}
</script>
</body>
