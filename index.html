<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Vacaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F6F3;
    --surface: #FFFFFF;
    --ink: #1F2D2B;
    --ink-soft: #5B6864;
    --accent: #2F6F5E;
    --accent-dark: #234f43;
    --accent-soft: #E4EEEA;
    --warm: #C9793A;
    --warm-soft: #F6E7D8;
    --success: #3D8B5F;
    --success-soft: #E1F0E6;
    --danger: #B4453B;
    --danger-soft: #F6E1DF;
    --line: #DDE3DF;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand{
    font-family:'Fraunces',serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  #root{min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- Login ---------- */
  .login-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;padding:24px;
    background:
      linear-gradient(180deg, rgba(47,111,94,0.06), rgba(47,111,94,0) 40%);
  }
  .login-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:40px 36px;
    width:100%;max-width:400px;
    box-shadow:0 1px 2px rgba(31,45,43,0.04);
  }
  .login-brand{font-size:26px;color:var(--accent-dark);margin:0 0 4px;}
  .login-sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 28px;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.04em;}
  input, select, textarea{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:7px;
    font-size:14.5px;font-family:'Inter',sans-serif;background:#fff;color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .mono-input{font-family:'IBM Plex Mono',monospace;}
  button{
    cursor:pointer;border:none;border-radius:7px;font-family:'Inter',sans-serif;
    font-weight:600;font-size:14px;padding:11px 18px;transition:opacity .15s ease;
  }
  button:hover{opacity:.9;}
  button:active{opacity:.8;}
  .btn-primary{background:var(--accent);color:#fff;width:100%;margin-top:22px;}
  .btn-ghost{background:transparent;color:var(--accent-dark);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-success{background:var(--success);color:#fff;}
  .btn-small{padding:7px 12px;font-size:13px;}
  .error-box{background:var(--danger-soft);color:var(--danger);padding:10px 12px;border-radius:7px;font-size:13.5px;margin-top:16px;}
  .success-box{background:var(--success-soft);color:var(--success);padding:12px 14px;border-radius:7px;font-size:13.5px;margin-bottom:16px;line-height:1.5;}
  .hint{color:var(--ink-soft);font-size:12.5px;margin-top:10px;line-height:1.5;}

  /* ---------- App shell ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--line);
  }
  .topbar-left{display:flex;align-items:center;gap:10px;}
  .topbar-brand{font-size:19px;color:var(--accent-dark);}
  .badge-role{
    font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 8px;border-radius:20px;
    background:var(--accent-soft);color:var(--accent-dark);
  }
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .user-name{font-size:13.5px;color:var(--ink-soft);}
  .content{flex:1;padding:28px;max-width:1100px;margin:0 auto;width:100%;}
  .tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
  .tab{
    padding:9px 16px;border-radius:20px;font-size:13.5px;font-weight:600;
    background:transparent;color:var(--ink-soft);border:1px solid transparent;cursor:pointer;
  }
  .tab.active{background:var(--accent);color:#fff;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:24px;margin-bottom:20px;
  }
  .card h3{margin:0 0 16px;font-size:17px;color:var(--ink);}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:640px){.grid-2{grid-template-columns:1fr;}}

  /* ---------- Vacation stub (signature element) ---------- */
  .stub{
    display:flex;flex-wrap:wrap;gap:0;border:1px dashed var(--line);border-radius:8px;overflow:hidden;
  }
  .stub-block{flex:1;min-width:120px;padding:16px 18px;border-right:1px dashed var(--line);}
  .stub-block:last-child{border-right:none;}
  .stub-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:6px;}
  .stub-value{font-family:'IBM Plex Mono',monospace;font-size:24px;color:var(--accent-dark);font-weight:600;}
  .stub-value.warm{color:var(--warm);}
  .stub-value.small{font-size:15px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{
    text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--ink-soft);border-bottom:1px solid var(--line);font-weight:600;
  }
  td{padding:11px 12px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .num{font-family:'IBM Plex Mono',monospace;}

  .status{
    display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;
    font-family:'IBM Plex Mono',monospace;letter-spacing:.03em;transform:rotate(-1deg);
  }
  .status.pendiente{background:var(--warm-soft);color:var(--warm);}
  .status.aprobado{background:var(--success-soft);color:var(--success);}
  .status.rechazado{background:var(--danger-soft);color:var(--danger);}

  .row-actions{display:flex;gap:8px;}
  .empty{color:var(--ink-soft);font-size:13.5px;padding:24px 0;text-align:center;}
  .field-row{display:flex;gap:12px;flex-wrap:wrap;}
  .field-row > div{flex:1;min-width:160px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .link-btn{background:none;border:none;color:var(--accent-dark);font-weight:600;font-size:13.5px;padding:0;text-decoration:underline;cursor:pointer;}
  .month-bar-wrap{display:flex;flex-direction:column;gap:8px;}
  .month-bar-row{display:flex;align-items:center;gap:10px;}
  .month-bar-label{width:100px;font-size:12.5px;color:var(--ink-soft);}
  .month-bar-track{flex:1;background:var(--accent-soft);border-radius:6px;height:18px;overflow:hidden;}
  .month-bar-fill{background:var(--accent);height:100%;border-radius:6px;}
  .month-bar-value{width:36px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  .config-note{background:var(--warm-soft);color:#7a4a1f;padding:14px 16px;border-radius:8px;font-size:13.5px;margin:20px auto;max-width:500px;line-height:1.6;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-cell{
    aspect-ratio:1;border:1px solid var(--line);border-radius:7px;padding:4px 5px;
    position:relative;background:#fff;
  }
  .cal-head{border:none;background:none;aspect-ratio:auto;text-align:center;
    font-weight:700;font-size:11px;color:var(--ink-soft);padding:2px 0;text-transform:uppercase;}
  .cal-empty{border:none;background:none;}
  .cal-hasvac{background:var(--accent-soft);border-color:var(--accent);}
  .cal-daynum{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);}
  .cal-hasvac .cal-daynum{color:var(--accent-dark);font-weight:600;}
  .cal-badge{
    position:absolute;bottom:4px;right:4px;background:var(--accent);color:#fff;
    border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;
    font-size:9.5px;font-weight:700;font-family:'IBM Plex Mono',monospace;
  }
  .cal-legend{margin-top:14px;font-size:13px;}
  .cal-legend-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);}
  .cal-legend-item:last-child{border-bottom:none;}
  .cat-chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;}
  .cat-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .conflict-item{background:var(--danger-soft);color:var(--danger);border-radius:7px;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.5;}
  .cal-conflict{outline:2px solid var(--danger);outline-offset:-1px;}
</style>
</head>
<body>

<script type="module">

let app, auth, db;

  app = initializeApp(firebaseConfig);

/* ================= Utilidades de vacaciones (LFT 2023) ================= */
function diasPorAntiguedad(years){
  if (years < 1) return 0;
  if (years <= 5) return 10 + 2*years; // 1:12 2:14 3:16 4:18 5:20
  const bloque = Math.ceil((years-5)/5);
  return 20 + 2*bloque; // 6-10:22 11-15:24 16-20:26 ...
}
function antiguedadAnios(fechaIngresoStr){
  const ing = new Date(fechaIngresoStr+"T00:00:00");
  const hoy = new Date();
  let years = hoy.getFullYear() - ing.getFullYear();
  const anniv = new Date(ing); anniv.setFullYear(ing.getFullYear()+years);
  if (anniv > hoy) years -= 1;
  return Math.max(0, years);
}
function diasHabilesEntre(fi, ff){
  const d1 = new Date(fi+"T00:00:00"), d2 = new Date(ff+"T00:00:00");
  if (d2 < d1) return 0;
  let count=0, cur=new Date(d1);
  while(cur<=d2){
    const day=cur.getDay();
    if(day!==0) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}
function isoWeek(dateStr){
  const d = new Date(dateStr+"T00:00:00");
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - ((d.getDay()+6)%7));
  const week1 = new Date(d.getFullYear(),0,4);
  return 1 + Math.round(((d-week1)/86400000 - 3 + ((week1.getDay()+6)%7))/7);
}
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_SEMANA = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
function todayStr(){
  const d = new Date(); d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}
function addDaysStr(dateStr, n){
  const d = new Date(dateStr+"T00:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
const DIAS_ANTICIPACION = 7;
function fechaAniversario(fechaIngresoStr, n){
  const d = new Date(fechaIngresoStr+"T00:00:00");
  d.setFullYear(d.getFullYear()+n);
  return d.toISOString().slice(0,10);
}
function calcularPeriodoActual(fechaIngresoStr){
  const anios = antiguedadAnios(fechaIngresoStr);
  const inicio = fechaAniversario(fechaIngresoStr, anios);
  const inicioSiguiente = fechaAniversario(fechaIngresoStr, anios+1);
  const fin = addDaysStr(inicioSiguiente, -1);
  return {inicio, fin, anios};
}
const PALETA_CATEGORIAS = ["#2F6F5E","#C9793A","#5B7FBD","#A2557B","#3D8B5F","#7A5C3E","#4E8FA6","#8C6E4E","#6E6E9E","#9C6644"];
function colorCategoria(cat){
  if(!cat) return "#A7B0AC";
  let hash=0;
  for(let i=0;i<cat.length;i++) hash = cat.charCodeAt(i) + ((hash<<5)-hash);
  return PALETA_CATEGORIAS[Math.abs(hash) % PALETA_CATEGORIAS.length];
}
function categoriaDe(nomina){
  const emp = state.employees.find(e=>e.nomina===nomina);
  return emp && emp.categoria ? emp.categoria.trim() : "";
}

/* ================= Estado ================= */
let state = {
  user: null,        // {nomina, nombre, isAdmin}
  employees: [],
  requests: [],
  view: "empleados",
  loginError: "",
  loading: false,
  unsubEmployees: null,
  unsubRequests: null,
};

const root = document.getElementById("root");

/* ================= Render raíz ================= */
function render(){
  if (CONFIG_PENDING){ renderConfigPending(); return; }
  if (!state.user){ renderLogin(); return; }
  if (state.user.isAdmin){ renderAdminShell(); } else { renderEmpleadoShell(); }
}

function renderConfigPending(){
  root.innerHTML = `
    <div class="login-wrap">
      <div class="login-card" style="max-width:520px;">
        <h1 class="login-brand">Control de Vacaciones</h1>
        <p class="login-sub">Falta conectar la base de datos.</p>
        <div class="config-note">
          Este archivo necesita tu configuración de Firebase antes de funcionar.
          Abre <span class="mono">index.html</span>, busca el objeto
          <span class="mono">firebaseConfig</span> cerca del inicio del script y
          sustitúyelo por el que te da la consola de Firebase (Configuración del
          proyecto → Tus apps → SDK de Firebase). Revisa el
          <span class="mono">README.md</span> para el paso a paso completo.
        </div>
      </div>
    </div>`;
}

/* ================= Login ================= */
function renderLogin(){
  root.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <h1 class="login-brand">Control de Vacaciones</h1>
        <p class="login-sub">Ingresa con tu número de nómina. Si es tu primera vez, elige aquí la contraseña que quieras usar.</p>
        <form id="loginForm">
          <label>Número de nómina</label>
          <input class="mono-input" id="nomina" required placeholder="Ej. 0042" />
          <label>Contraseña</label>
          <input type="password" id="password" required placeholder="Mínimo 6 caracteres" />
          ${state.loginError ? `<div class="error-box">${state.loginError}</div>` : ""}
          <button class="btn-primary" type="submit" ${state.loading?"disabled":""}>${state.loading? "Entrando…" : "Entrar"}</button>
        </form>
        <p class="hint">¿No tienes número de nómina asignado? Pídelo a Recursos Humanos.</p>
        <p class="hint" style="margin-top:18px;">
          <button class="link-btn" id="setupLink">¿Primera vez que se usa el sistema? Configurar administrador</button>
        </p>
      </div>
    </div>`;
  document.getElementById("loginForm").addEventListener("submit", handleLogin);
  document.getElementById("setupLink").addEventListener("click", renderSetupAdmin);
}

async function handleLogin(e){
  e.preventDefault();
  const nomina = document.getElementById("nomina").value.trim();
  const password = document.getElementById("password").value;
  state.loginError = ""; state.loading = true; render();
  try{
    const empRef = doc(db,"employees",nomina);
    const empSnap = await getDoc(empRef);
    if(!empSnap.exists()){
      state.loginError = "Ese número de nómina no está registrado. Contacta a RH.";
      state.loading=false; render(); return;
    }
    const email = nomina+"@vacaciones.local";
    try{
      await signInWithEmailAndPassword(auth, email, password);
    }catch(err){
      if(err.code === "auth/user-not-found" || err.code === "auth/invalid-credential"){
        // primer inicio de sesión: intentamos crear la cuenta con esa contraseña
        try{
          await createUserWithEmailAndPassword(auth, email, password);
        }catch(err2){
          if(err2.code === "auth/email-already-in-use"){
            state.loginError = "Contraseña incorrecta.";
          } else if(err2.code === "auth/weak-password"){
            state.loginError = "La contraseña debe tener al menos 6 caracteres.";
          } else {
            state.loginError = "No se pudo iniciar sesión: " + err2.message;
          }
          state.loading=false; render(); return;
        }
      } else if(err.code === "auth/wrong-password"){
        state.loginError = "Contraseña incorrecta.";
        state.loading=false; render(); return;
      } else {
        state.loginError = "No se pudo iniciar sesión: " + err.message;
        state.loading=false; render(); return;
      }
    }
    // onAuthStateChanged se encarga de cargar el perfil y renderizar
  }catch(err){
    state.loginError = "Ocurrió un error: " + err.message;
    state.loading=false; render();
  }
}

function renderSetupAdmin(e){
  e.preventDefault();
  root.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <h1 class="login-brand">Configurar administrador</h1>
        <p class="login-sub">Usa esto solo la primera vez, para crear la cuenta principal de RH/administración.</p>
        <form id="setupForm">
          <label>Número de nómina (del admin)</label>
          <input class="mono-input" id="s_nomina" required placeholder="Ej. 0001" />
          <label>Nombre completo</label>
          <input id="s_nombre" required placeholder="Nombre y apellidos" />
          <label>Fecha de ingreso</label>
          <input type="date" id="s_fecha" required />
          <label>Contraseña</label>
          <input type="password" id="s_password" required placeholder="Mínimo 6 caracteres" />
          <div id="setupError"></div>
          <button class="btn-primary" type="submit">Crear cuenta de administrador</button>
        </form>
        <p class="hint"><button class="link-btn" id="backLink">Volver al inicio de sesión</button></p>
      </div>
    </div>`;
  document.getElementById("backLink").addEventListener("click", (ev)=>{ev.preventDefault(); render();});
  document.getElementById("setupForm").addEventListener("submit", handleSetupAdmin);
}

async function handleSetupAdmin(e){
  e.preventDefault();
  const nomina = document.getElementById("s_nomina").value.trim();
  const nombre = document.getElementById("s_nombre").value.trim();
  const fecha = document.getElementById("s_fecha").value;
  const password = document.getElementById("s_password").value;
  const errBox = document.getElementById("setupError");
  try{
    const empRef = doc(db,"employees",nomina);
    const snap = await getDoc(empRef);
    if(snap.exists()){
      errBox.innerHTML = `<div class="error-box">Ese número de nómina ya existe. Usa "Entrar" en la pantalla principal.</div>`;
      return;
    }
    const email = nomina+"@vacaciones.local";
    try{
      await createUserWithEmailAndPassword(auth, email, password);
    }catch(errAuth){
      if(errAuth.code === "auth/email-already-in-use"){
        // Quedó una cuenta de acceso de un intento anterior sin completar:
        // iniciamos sesión con ella en vez de crearla de nuevo.
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        throw errAuth;
      }
    }
    await setDoc(empRef, {
      nomina, nombre, fechaIngreso: fecha, isAdmin:true, diasManual:null, activo:true
    });
    await setDoc(doc(db,"meta","setup"), {creado:true, nomina, fecha: new Date().toISOString()});
  }catch(err){
    errBox.innerHTML = `<div class="error-box">${err.message}</div>`;
  }
}

/* ================= Auth listener ================= */
function watchAuth(){
  onAuthStateChanged(auth, async (fbUser)=>{
    if(!fbUser){
      state.user=null;
      detachListeners();
      render();
      return;
    }
    const nomina = fbUser.email.split("@")[0];
    const snap = await getDoc(doc(db,"employees",nomina));
    if(!snap.exists()){
      await signOut(auth);
      return;
    }
    const data = snap.data();
    state.user = {nomina, nombre:data.nombre, isAdmin:!!data.isAdmin};
    state.loading = false;
    state.view = state.user.isAdmin ? "empleados" : "misvacaciones";
    attachListeners();
    render();
  });
}

function attachListeners(){
  detachListeners();
  state.unsubEmployees = onSnapshot(collection(db,"employees"), (snap)=>{
    state.employees = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  });
  // Un admin puede escuchar TODAS las solicitudes. Un empleado solo puede
  // escuchar las suyas: las reglas de seguridad exigen que la consulta
  // venga filtrada por su propia nómina, o Firestore la rechaza entera
  // (así estaba el bug: al empleado nunca le llegaba ni su propia solicitud).
  const requestsQuery = state.user.isAdmin
    ? collection(db,"requests")
    : query(collection(db,"requests"), where("nomina","==",state.user.nomina));
  state.unsubRequests = onSnapshot(requestsQuery, (snap)=>{
    state.requests = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  });
}
function detachListeners(){
  if(state.unsubEmployees) state.unsubEmployees();

/* ================= Cálculo de balance de un empleado ================= */
function balanceDe(nomina){
  const emp = state.employees.find(e=>e.nomina===nomina);
  if(!emp) return {antig:0, totales:0, tomados:0, restantes:0, esAdmin:false, ajustado:false};
  if(emp.isAdmin) return {antig:null, totales:null, tomados:null, restantes:null, esAdmin:true, ajustado:false};

  const periodo = calcularPeriodoActual(emp.fechaIngreso);
  const totalesCalculados = (emp.diasManual!==null && emp.diasManual!==undefined) ? emp.diasManual : diasPorAntiguedad(periodo.anios);

  // Los días de un periodo que ya terminó NO se suman al siguiente: solo
  // contamos aprobaciones cuya fecha de inicio cae dentro del periodo vigente.
  const tomadosPeriodo = state.requests
    .filter(r=>r.nomina===nomina && r.estado==="aprobado" && r.fechaInicio>=periodo.inicio && r.fechaInicio<=periodo.fin)
    .reduce((sum,r)=>sum+(r.diasHabiles||0),0);

  // Ajuste manual de "días restantes": solo aplica si fue registrado para
  // ESTE MISMO periodo vigente. En cuanto el periodo cambie (nuevo aniversario),
  // deja de aplicar automáticamente y todo vuelve al cálculo normal.
  const tieneAjuste = (emp.diasRestantesIniciales!==null && emp.diasRestantesIniciales!==undefined)
    && emp.diasRestantesInicialesPeriodoInicio === periodo.inicio;

  if(tieneAjuste){
    const restantes = Math.max(0, emp.diasRestantesIniciales - tomadosPeriodo);
    const totales = emp.diasRestantesIniciales + tomadosPeriodo;
    return {antig:periodo.anios, totales, tomados:tomadosPeriodo, restantes, esAdmin:false, ajustado:true};
  }

  const restantes = Math.max(0, totalesCalculados - tomadosPeriodo);
  return {antig:periodo.anios, totales:totalesCalculados, tomados:tomadosPeriodo, restantes, esAdmin:false, ajustado:false};
}

      </div>

      <div class="card">
        <h3>Solicitar vacaciones</h3>
        ${state.reqFeedback ? `<div class="success-box">${state.reqFeedback}</div>` : ""}
        <form id="reqForm">
          <div class="field-row">
            <div>
              <label>Fecha de inicio</label>
              <input type="date" id="fi" min="${addDaysStr(todayStr(),DIAS_ANTICIPACION)}" required />
            </div>
            <div>
              <label>Fecha de fin</label>
              <input type="date" id="ff" min="${addDaysStr(todayStr(),DIAS_ANTICIPACION)}" required />
            </div>
          </div>
          <p class="hint">
            Un solo día = misma fecha en inicio y fin (ej. 02 al 02 de enero).
            Dos días = 02 al 03 de enero, y así sucesivamente. Solo se cuentan días hábiles (lunes a sábado; el domingo no cuenta).

          </p>
          <div id="diasPreview" class="hint" style="font-weight:600;color:var(--accent-dark);"></div>
          <label>Comentario (opcional)</label>
          <textarea id="comentario" rows="2" placeholder="Ej. viaje familiar, trámite personal…"></textarea>
          <div id="reqError"></div>
          <button class="btn-primary" type="submit" style="width:auto;">Enviar solicitud</button>
        </form>
      </div>

      <div class="card">
        <h3>Tus solicitudes</h3>
        ${misSolicitudes.length===0 ? `<div class="empty">Aún no has hecho ninguna solicitud.</div>` : `
        <table>
          <thead><tr><th>Del</th><th>Al</th><th>Días hábiles</th><th>Estatus</th><th>Comentario admin</th></tr></thead>
          <tbody>
            ${misSolicitudes.map(r=>`
              <tr>
                <td class="num">${r.fechaInicio}</td>
                <td class="num">${r.fechaFin}</td>
                <td class="num">${r.diasHabiles}</td>
                <td><span class="status ${r.estado}">${r.estado.toUpperCase()}</span></td>
                <td>${r.comentarioAdmin||"—"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>`}
      </div>
    </div>`;
  bindTopbar();
  document.getElementById("reqForm").addEventListener("submit", handleNuevaSolicitud);
  const fiInput = document.getElementById("fi");
  const ffInput = document.getElementById("ff");
  function actualizarPreview(){
    // el fin no puede ser antes que el inicio
    if(fiInput.value) ffInput.min = fiInput.value;
    const preview = document.getElementById("diasPreview");
    if(fiInput.value && ffInput.value){
      const dias = diasHabilesEntre(fiInput.value, ffInput.value);
      preview.textContent = dias>0
        ? `Esta solicitud equivale a ${dias} día${dias===1?"":"s"} hábil${dias===1?"":"es"}.`
        : `Revisa las fechas: no hay ningún día hábil en ese rango.`;
    } else {
      preview.textContent = "";
    }
  }
  fiInput.addEventListener("change", actualizarPreview);
  ffInput.addEventListener("change", actualizarPreview);
}

async function handleNuevaSolicitud(e){
  e.preventDefault();
  const fi = document.getElementById("fi").value;
  const ff = document.getElementById("ff").value;
  const comentario = document.getElementById("comentario").value.trim();
  const errBox = document.getElementById("reqError");
  errBox.innerHTML = "";

  const minInicio = addDaysStr(todayStr(), DIAS_ANTICIPACION);
  if(fi < minInicio){
    errBox.innerHTML = `<div class="error-box">Las solicitudes deben hacerse con al menos ${DIAS_ANTICIPACION} días de anticipación. La fecha de inicio más próxima que puedes elegir es ${minInicio}.</div>`;
    return;
  }
  const dias = diasHabilesEntre(fi,ff);
  if(dias<=0){
    errBox.innerHTML = `<div class="error-box">Revisa las fechas: la fecha de fin debe ser igual o posterior a la de inicio, y el rango debe incluir al menos un día hábil.</div>`;
    return;
  }
  const b = balanceDe(state.user.nomina);
  if(dias > b.restantes){
    errBox.innerHTML = `<div class="error-box">Solo tienes ${b.restantes} día(s) disponibles y estás solicitando ${dias}.</div>`;
    return;
  }
  await addDoc(collection(db,"requests"), {
    nomina: state.user.nomina,
    nombreEmpleado: state.user.nombre,
    fechaInicio: fi, fechaFin: ff, diasHabiles: dias,
    estado: "pendiente", comentarioEmpleado: comentario, comentarioAdmin:"",
    fechaSolicitud: serverTimestamp()
  });
  state.reqFeedback = `Tu solicitud del ${fi} al ${ff} (${dias} día${dias===1?"":"s"} hábil${dias===1?"":"es"}) fue enviada y está pendiente de aprobación. La verás abajo en "Tus solicitudes".`;
  render();
}

function renderEmpForm(emp){
  const wrap = document.getElementById("empFormWrap");
  const esNuevo = !emp;
  const fechaActual = emp?.fechaIngreso || "";
  const periodoPreview = fechaActual ? calcularPeriodoActual(fechaActual) : null;
  const ajusteVigente = emp && periodoPreview && emp.diasRestantesIniciales!==null && emp.diasRestantesIniciales!==undefined
    && emp.diasRestantesInicialesPeriodoInicio === periodoPreview.inicio;
  const ajusteVencido = emp && emp.diasRestantesIniciales!==null && emp.diasRestantesIniciales!==undefined && !ajusteVigente;

  wrap.innerHTML = `
    <div class="card" style="background:var(--accent-soft);border:none;margin-bottom:20px;">
      <h3>${esNuevo? "Nuevo empleado" : "Editar empleado"}</h3>
      <form id="empForm">
        <div class="field-row">
          <div>
            <label>Número de nómina</label>
            <input class="mono-input" id="f_nomina" value="${emp?.nomina||""}" ${esNuevo?"":"disabled"} required />
          </div>
          <div>
            <label>Nombre completo</label>
            <input id="f_nombre" value="${emp?.nombre||""}" required />
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Fecha de ingreso</label>
            <input type="date" id="f_fecha" value="${fechaActual}" required />
          </div>
          <div>
            <label>Días anuales manuales (opcional)</label>
            <input type="number" min="0" id="f_manual" value="${emp?.diasManual ?? ""}" placeholder="Dejar vacío = calculado" />
          </div>
        </div>
        <label>Categoría / departamento (opcional)</label>
        <input id="f_categoria" list="listaCategorias" value="${emp?.categoria||""}" placeholder="Ej. Ventas, Producción, Administración…" />
        <datalist id="listaCategorias">
          ${[...new Set(state.employees.map(e=>e.categoria).filter(Boolean))].map(c=>`<option value="${c}"></option>`).join("")}
        </datalist>
        <p class="hint">Se usa para colorear el calendario y avisar si dos personas de la misma categoría piden las mismas fechas.</p>

        <label>Días restantes en su periodo actual (opcional)</label>
        <input type="number" min="0" id="f_restantes" value="${emp?.diasRestantesIniciales ?? ""}" placeholder="Dejar vacío = sin ajuste manual" />
        <p class="hint" id="periodoHint"></p>
        ${ajusteVigente? `<p class="hint" style="color:var(--accent-dark);">⚙ Ajuste activo para el periodo vigente.</p>` : ""}
        ${ajusteVencido? `<p class="hint" style="color:var(--warm);">Este empleado tenía un ajuste, pero era de un periodo anterior; ya no se está aplicando (el sistema ya calcula el periodo actual de forma automática). Si quieres corregir el periodo actual, vuelve a escribir el número de días restantes.</p>` : ""}
        <p class="hint">Anota cuántos días le <strong>quedan</strong> por tomar en su periodo actual (no el total). Úsalo solo la primera vez que registras a alguien que ya había tomado vacaciones antes de usar este sistema. Este ajuste solo aplica al periodo vigente; cuando termine (en su próximo aniversario), el sistema vuelve a calcular automático sin que tengas que hacer nada.</p>

        <label style="display:flex;align-items:center;gap:8px;margin-top:16px;text-transform:none;">
          <input type="checkbox" id="f_admin" style="width:auto;" ${emp?.isAdmin?"checked":""} />
          <span style="font-weight:600;font-size:13.5px;color:var(--ink);">Es administrador</span>
        </label>
        <p class="hint">Los administradores no solicitan vacaciones dentro del sistema, así que no se les calculan días.</p>
        ${esNuevo? `<p class="hint">La contraseña la elige el propio empleado la primera vez que inicia sesión con este número de nómina.</p>`:""}
        <div id="empFormError"></div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn-primary" style="width:auto;margin:0;" type="submit">${esNuevo?"Crear":"Guardar cambios"}</button>
          <button class="btn-ghost" type="button" id="cancelEmpForm">Cancelar</button>
        </div>
      </form>
    </div>`;
  document.getElementById("cancelEmpForm").addEventListener("click", ()=>{wrap.innerHTML="";});
  const fechaInput = document.getElementById("f_fecha");
  function actualizarPeriodoHint(){
    const hint = document.getElementById("periodoHint");
    if(fechaInput.value){
      const p = calcularPeriodoActual(fechaInput.value);
      hint.textContent = `Periodo vigente de este empleado: ${p.inicio} a ${p.fin}.`;
    } else {
      hint.textContent = "";
    }
  }
  actualizarPeriodoHint();
  fechaInput.addEventListener("change", actualizarPeriodoHint);
  document.getElementById("empForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const nomina = document.getElementById("f_nomina").value.trim();
    const nombre = document.getElementById("f_nombre").value.trim();
    const fecha = document.getElementById("f_fecha").value;
    const manualRaw = document.getElementById("f_manual").value;
    const diasManual = manualRaw===""? null : Number(manualRaw);
    const categoria = document.getElementById("f_categoria").value.trim();
    const restantesRaw = document.getElementById("f_restantes").value;
    let diasRestantesIniciales = null, diasRestantesInicialesPeriodoInicio = null;
    if(restantesRaw !== ""){
      diasRestantesIniciales = Number(restantesRaw);
      diasRestantesInicialesPeriodoInicio = calcularPeriodoActual(fecha).inicio;
    }
    const isAdmin = document.getElementById("f_admin").checked;
    const errBox = document.getElementById("empFormError");
    try{
      if(esNuevo){
        const existSnap = await getDoc(doc(db,"employees",nomina));
        if(existSnap.exists()){
          errBox.innerHTML = `<div class="error-box">Ya existe un empleado con esa nómina.</div>`;
          return;
        }
        await setDoc(doc(db,"employees",nomina), {nomina, nombre, fechaIngreso:fecha, diasManual, categoria, diasRestantesIniciales, diasRestantesInicialesPeriodoInicio, isAdmin, activo:true});
      } else {
        await updateDoc(doc(db,"employees",nomina), {nombre, fechaIngreso:fecha, diasManual, categoria, diasRestantesIniciales, diasRestantesInicialesPeriodoInicio, isAdmin});
      }
      wrap.innerHTML="";
    }catch(err){
      errBox.innerHTML = `<div class="error-box">${err.message}</div>`;
    }
  });
}

            <input type="date" id="e_fi" value="${req.fechaInicio}" required />
          </div>
          <div>
            <label>Fecha de fin</label>
            <input type="date" id="e_ff" value="${req.fechaFin}" required />
          </div>
        </div>
        <div id="editDiasPreview" class="hint" style="font-weight:600;color:var(--accent-dark);"></div>
        <div id="editReqError"></div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn-primary" style="width:auto;margin:0;" type="submit">Guardar cambios</button>
          <button class="btn-ghost" type="button" id="cancelEditReq">Cancelar</button>
        </div>
      </form>
    </div>`;
  const fiInput = document.getElementById("e_fi");
  const ffInput = document.getElementById("e_ff");
  function actualizarPreview(){
    const dias = diasHabilesEntre(fiInput.value, ffInput.value);
    document.getElementById("editDiasPreview").textContent = dias>0
      ? `Nuevo total: ${dias} día${dias===1?"":"s"} hábil${dias===1?"":"es"} (antes eran ${req.diasHabiles}).`
      : "Revisa las fechas: no hay ningún día hábil en ese rango.";
  }
  actualizarPreview();
  fiInput.addEventListener("change", actualizarPreview);
  ffInput.addEventListener("change", actualizarPreview);
  document.getElementById("cancelEditReq").addEventListener("click", ()=>{wrap.innerHTML="";});
  document.getElementById("editReqForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const fi = fiInput.value, ff = ffInput.value;
    const errBox = document.getElementById("editReqError");
    const dias = diasHabilesEntre(fi, ff);
    if(dias<=0){
      errBox.innerHTML = `<div class="error-box">Revisa las fechas: la fecha de fin debe ser igual o posterior a la de inicio, y el rango debe incluir al menos un día hábil.</div>`;
      return;
    }
    if(req.estado==="aprobado"){
      const cat = categoriaDe(req.nomina);
      if(cat){
        const enConflicto = state.requests.filter(r=>
          r.id!==req.id && r.estado==="aprobado" && r.nomina!==req.nomina &&
          categoriaDe(r.nomina)===cat && fi<=r.fechaFin && r.fechaInicio<=ff
        );
        if(enConflicto.length>0){
          const detalle = enConflicto.map(r=>`- ${r.nombreEmpleado} (${r.fechaInicio} a ${r.fechaFin})`).join("\n");
          if(!confirm(`Aviso: con estas nuevas fechas se cruza con otra persona de la misma categoría "${cat}":\n\n${detalle}\n\n¿Guardar de todas formas?`)) return;
        }
      }
    }
    await updateDoc(doc(db,"requests",req.id), {fechaInicio:fi, fechaFin:ff, diasHabiles:dias});
    wrap.innerHTML="";
  });
}

async function borrarSolicitud(id){
  if(confirm("¿Eliminar esta solicitud? Esta acción no se puede deshacer.")){
    await deleteDoc(doc(db,"requests",id));
  }
}

async function borrarTodoElHistorial(resueltas){
  if(!confirm(`¿Eliminar las ${resueltas.length} solicitudes resueltas (aprobadas/rechazadas)? Esta acción no se puede deshacer.`)) return;
  for(const r of resueltas){
    await deleteDoc(doc(db,"requests",r.id));
  }
}

async function resolverSolicitud(id, estado){
  const req = state.requests.find(r=>r.id===id);
  let comentarioAdmin = "";
  if(estado==="rechazado"){
    comentarioAdmin = prompt("Motivo del rechazo (opcional):") || "";
  }
  if(estado==="aprobado" && req){
    const cat = categoriaDe(req.nomina);
    if(cat){
      const enConflicto = state.requests.filter(r=>
        r.id!==id && r.estado==="aprobado" && r.nomina!==req.nomina &&
        categoriaDe(r.nomina)===cat &&
        r.fechaInicio<=req.fechaFin && req.fechaInicio<=r.fechaFin
      );
      if(enConflicto.length>0){
        const detalle = enConflicto.map(r=>`- ${r.nombreEmpleado} (${r.fechaInicio} a ${r.fechaFin})`).join("\n");
        const continuar = confirm(`Aviso: ya hay vacaciones aprobadas de la misma categoría "${cat}" en fechas que se cruzan:\n\n${detalle}\n\n¿Aprobar de todas formas?`);
        if(!continuar) return;
      }
    }
  }
  await updateDoc(doc(db,"requests",id), {estado, comentarioAdmin});
}

function construirCalendarioMes(year, month){
  const pad = n=>String(n).padStart(2,"0");
  const primerDia = new Date(year,month,1).getDay();
  const diasEnMes = new Date(year,month+1,0).getDate();
  const aprobadas = state.requests.filter(r=>r.estado==="aprobado");
  const finMes = `${year}-${pad(month+1)}-${pad(diasEnMes)}`;
  const inicioMes = `${year}-${pad(month+1)}-01`;

  // Conflictos: pares de solicitudes aprobadas, de empleados distintos,
  // con la misma categoría, cuyas fechas se cruzan en algún punto de este mes.
  const enEsteMes = aprobadas.filter(r=>r.fechaInicio<=finMes && r.fechaFin>=inicioMes)
    .sort((a,b)=>a.fechaInicio.localeCompare(b.fechaInicio));
  const conflictos = [];
  const diasConConflicto = new Set();
  for(let i=0;i<enEsteMes.length;i++){
    for(let j=i+1;j<enEsteMes.length;j++){
      const a=enEsteMes[i], b=enEsteMes[j];
      if(a.nomina===b.nomina) continue;
      const catA = categoriaDe(a.nomina), catB = categoriaDe(b.nomina);
      if(!catA || catA!==catB) continue;
      const inicioSolape = a.fechaInicio > b.fechaInicio ? a.fechaInicio : b.fechaInicio;
      const finSolape = a.fechaFin < b.fechaFin ? a.fechaFin : b.fechaFin;
      if(inicioSolape<=finSolape){
        conflictos.push({categoria:catA, a, b, inicioSolape, finSolape});
        let cur = new Date(inicioSolape+"T00:00:00");
        const fin = new Date(finSolape+"T00:00:00");
        while(cur<=fin){ diasConConflicto.add(`${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`); cur.setDate(cur.getDate()+1); }
      }
    }
  }

  let celdas = "";
  for(let i=0;i<primerDia;i++) celdas += `<div class="cal-cell cal-empty"></div>`;
  for(let d=1; d<=diasEnMes; d++){
    const dateStr = `${year}-${pad(month+1)}-${pad(d)}`;
    const matches = aprobadas.filter(r=>r.fechaInicio<=dateStr && r.fechaFin>=dateStr);
    const nombres = matches.map(r=>`${r.nombreEmpleado}${categoriaDe(r.nomina)?` (${categoriaDe(r.nomina)})`:""}`).join(", ");
    const tieneConflicto = diasConConflicto.has(dateStr);
    const dots = matches.slice(0,5).map(r=>`<span class="cal-dot" style="background:${colorCategoria(categoriaDe(r.nomina))}"></span>`).join("");
    celdas += `
      <div class="cal-cell ${matches.length>0?'cal-hasvac':''} ${tieneConflicto?'cal-conflict':''}" ${matches.length>0?`title="${nombres.replace(/"/g,'')}${tieneConflicto?' — ¡conflicto de categoría!':''}"`:""}>
        <div class="cal-daynum">${d}</div>
        ${matches.length>0? `<div style="position:absolute;bottom:4px;left:5px;display:flex;gap:2px;">${dots}</div>`:""}
        ${matches.length>0? `<div class="cal-badge" style="${tieneConflicto?'background:var(--danger);':''}">${matches.length}</div>`:""}
      </div>`;
  }

  return `
    <div class="cal-grid">
      ${DIAS_SEMANA.map(d=>`<div class="cal-cell cal-head">${d}</div>`).join("")}
      ${celdas}
    </div>
    ${conflictos.length>0 ? `
      <div style="margin-top:16px;">
        <h3 style="font-size:14.5px;color:var(--danger);">⚠ Conflictos de categoría este mes</h3>
        ${conflictos.map(c=>`
          <div class="conflict-item">
            Misma categoría <strong>"${c.categoria}"</strong>: <strong>${c.a.nombreEmpleado}</strong> (${c.a.fechaInicio} a ${c.a.fechaFin}) y <strong>${c.b.nombreEmpleado}</strong> (${c.b.fechaInicio} a ${c.b.fechaFin}) se cruzan del ${c.inicioSolape} al ${c.finSolape}.
          </div>`).join("")}
      </div>` : ""}
    <div class="cal-legend">
      ${enEsteMes.length===0? `<div class="empty">Nadie tiene vacaciones aprobadas este mes.</div>` : enEsteMes.map(r=>`
        <div class="cal-legend-item">
          <span><span class="cal-dot" style="background:${colorCategoria(categoriaDe(r.nomina))};margin-right:6px;"></span>${r.nombreEmpleado}${categoriaDe(r.nomina)?` · ${categoriaDe(r.nomina)}`:""}</span>
          <span class="num">${r.fechaInicio} → ${r.fechaFin}</span>
        </div>`).join("")}
    </div>`;
}

function renderTabReportes(container){
  const anioActual = new Date().getFullYear();
  if(!state.reportYear) state.reportYear = anioActual;
  if(state.reportMonth===undefined || state.reportMonth===null) state.reportMonth = new Date().getMonth();
  const anio = state.reportYear;
  const mes = state.reportMonth;

  const aprobadas = state.requests.filter(r=>r.estado==="aprobado" && r.fechaInicio && r.fechaInicio.startsWith(String(anio)));

  // por mes
  const porMes = new Array(12).fill(0);
  aprobadas.forEach(r=>{
    const m = new Date(r.fechaInicio+"T00:00:00").getMonth();
    porMes[m]+=r.diasHabiles;
  });
  const maxMes = Math.max(1,...porMes);

  // por semana fiscal (número de semana ISO)
  const porSemana = {};
  aprobadas.forEach(r=>{
    const w = isoWeek(r.fechaInicio);
    porSemana[w] = (porSemana[w]||0) + r.diasHabiles;
  });
  const semanasOrdenadas = Object.keys(porSemana).map(Number).sort((a,b)=>a-b);

  const anios = [...new Set(state.requests.map(r=>r.fechaInicio? r.fechaInicio.slice(0,4):null).filter(Boolean))];
  if(!anios.includes(String(anioActual))) anios.push(String(anioActual));
  anios.sort();

  container.innerHTML = `
    <div class="card">
      <div class="toolbar">
        <h3 style="margin:0;">Calendario de vacaciones</h3>
        <div style="display:flex;gap:8px;">
          <select id="monthSelect" style="width:auto;">
            ${MESES.map((m,i)=>`<option value="${i}" ${i===mes?"selected":""}>${m}</option>`).join("")}
          </select>
          <select id="yearSelectCal" style="width:auto;">
            ${anios.map(a=>`<option value="${a}" ${Number(a)===anio?"selected":""}>${a}</option>`).join("")}
          </select>
        </div>
      </div>
      ${construirCalendarioMes(anio, mes)}
      <p class="hint">El número en cada día es la cantidad de empleados de vacaciones. Pasa el cursor sobre un día marcado para ver quién (en celular, mantén presionado).</p>
    </div>

    <div class="card">
      <div class="toolbar">
        <h3 style="margin:0;">Días de vacaciones aprobados por mes</h3>
        <select id="yearSelect" style="width:auto;">
          ${anios.map(a=>`<option value="${a}" ${Number(a)===anio?"selected":""}>${a}</option>`).join("")}
        </select>
      </div>
      <div class="month-bar-wrap">
        ${MESES.map((m,i)=>`
          <div class="month-bar-row">
            <div class="month-bar-label">${m}</div>
            <div class="month-bar-track"><div class="month-bar-fill" style="width:${(porMes[i]/maxMes*100).toFixed(0)}%"></div></div>
            <div class="month-bar-value">${porMes[i]}</div>
          </div>`).join("")}
      </div>
    </div>

    <div class="card">
      <h3>Días aprobados por semana fiscal (${anio})</h3>
      ${semanasOrdenadas.length===0? `<div class="empty">No hay vacaciones aprobadas registradas en ${anio}.</div>` : `
      <table>
        <thead><tr><th>Semana del año</th><th>Días tomados (todos los empleados)</th></tr></thead>
        <tbody>
        ${semanasOrdenadas.map(w=>`<tr><td class="num">Semana ${w}</td><td class="num">${porSemana[w]}</td></tr>`).join("")}
        </tbody>
      </table>`}
      <p class="hint">Se numeran las semanas según el estándar ISO (semana 1 = la que contiene el primer jueves del año). Si tu calendario fiscal usa otra convención, puedes usar esta tabla como referencia y ajustarla.</p>
    </div>

    <div class="card">
      <h3>Resumen por empleado (${anio})</h3>
      <table>
        <thead><tr><th>Nómina</th><th>Nombre</th><th>Días tomados en ${anio}</th></tr></thead>
        <tbody>
        ${state.employees.map(emp=>{
          const total = aprobadas.filter(r=>r.nomina===emp.nomina).reduce((s,r)=>s+r.diasHabiles,0);
          return `<tr><td class="num">${emp.nomina}</td><td>${emp.nombre}</td><td class="num">${total}</td></tr>`;
        }).join("")}
        </tbody>
      </table>
    </div>`;

  document.getElementById("yearSelect").addEventListener("change",(e)=>{
    state.reportYear = Number(e.target.value);
    renderTabReportes(container);
  });
  document.getElementById("monthSelect").addEventListener("change",(e)=>{
    state.reportMonth = Number(e.target.value);
    renderTabReportes(container);
  });
  document.getElementById("yearSelectCal").addEventListener("change",(e)=>{
    state.reportYear = Number(e.target.value);
    renderTabReportes(container);
  });
}

/* ================= Arranque ================= */
if(!CONFIG_PENDING){
  watchAuth();
} else {
  render();
}
</script>
